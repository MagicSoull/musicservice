{% extends 'base.html' %}
{% block title %}Новый альбом — SoundDB{% endblock %}
{% block content %}

<div class="page-header">
    <h1>Новый альбом</h1>
    <a href="{{ url_for('albums') }}" class="btn btn--ghost">← Назад</a>
</div>

<div class="form-wrap">
    <form method="post">
        <div class="form-group">
            <label>Название *</label>
            <input type="text" name="title" required maxlength="40">
        </div>
        <div class="form-group">
            <label>Артист *</label>
            <select name="artist_id" required>
                <option value="">— Выберите артиста —</option>
                {% for a in artists %}
                <option value="{{ a.artist_id }}">{{ a.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Дата выхода</label>
            <input type="date" name="release_date">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn--primary">Создать альбом</button>
            <a href="{{ url_for('albums') }}" class="btn btn--ghost">Отмена</a>
        </div>
    </form>
</div>

{% endblock %}
